<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backrooms - Level 0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="vhs-overlay"></div>
    <div id="shadow-overlay"></div>
    <div id="overlay">
        <div id="main-menu">
            <h1 class="overlay-title">THE BACKROOMS</h1>
            <p class="overlay-subtitle">PROCEDURAL GENERATION ENGINE v4.0<br>beta 0.05</p>
            <div>
                <button class="btn-start" id="play-button">PLAY</button>
                <button class="btn-start" onclick="App.start('CONTINUE')">CONTINUE</button>
            </div>
        </div>
        <div id="gfx-menu" style="display: none;">
            <h1 class="overlay-title">SELECT GRAPHICS</h1>
            <br>
            <div>
                <button class="btn-start" onclick="App.start('LOW')">LOW GFX</button>
                <button class="btn-start" onclick="App.start('MEDIUM')">MEDIUM GFX</button>
                <button class="btn-start" onclick="App.start('HIGH')">ULTRA GFX</button>
            </div>
        </div>
    </div>
    <div id="credit">Engineered by Kantasu</div>

    <div id="hud">
        LEVEL: <span id="ui-lvl" style="color:#fff;">0</span> | BIOME: <span id="ui-biome">YELLOW</span><br>
        SANITY: <div class="bar-bg"><div id="sanity-fill"></div></div>
        ALMOND WATER: <span id="ui-water">0</span>
    </div>

    <div id="mobile-controls">
        <div id="joy-base"><div id="joy-knob"></div></div>
        <div id="btn-action">DRINK</div>
        <div id="btn-sprint">SPRINT</div>
    </div>

    <div id="pickup-prompt">E</div>

    <script src="js/main.js" type="module"></script>

</body>
</html>
